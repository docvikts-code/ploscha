<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandCalc Pro Ultimate</title>
    <style>
        :root { --p: #2e7d32; --bg: #f0f2f5; --accent: #d32f2f; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .app { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 460px; }
        h2 { color: var(--p); text-align: center; margin: 0 0 15px 0; font-size: 20px; }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 10px; background: #eee; padding: 4px; border-radius: 8px; }
        .tab { flex: 1; padding: 10px 2px; text-align: center; cursor: pointer; border-radius: 6px; font-size: 11px; font-weight: bold; background: none; border: none; color: #666; }
        .tab.active { background: white; color: var(--p); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .page { display: none; } .page.active { display: block; }
        .field { margin-bottom: 8px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #555; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        
        .split-box { background: #fffde7; padding: 12px; border-radius: 10px; border: 1px solid #fff9c4; margin-top: 10px; }
        .part-row { background: white; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 8px; position: relative; }
        .btn-add { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-del { position: absolute; top: -5px; right: -5px; background: #ffcdd2; color: #c62828; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-weight: bold; }

        .res-box { background: #e8f5e9; padding: 12px; border-radius: 10px; border-left: 5px solid var(--p); margin-top: 15px; }
        .res-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 14px; }
        .val { font-weight: bold; color: var(--p); }
        
        #canvas-wrap { margin-top: 15px; border: 1px dashed #aaa; border-radius: 8px; background: #fafafa; }
        canvas { width: 100%; height: auto; display: block; }
        .btn-reset { width: 100%; padding: 10px; background: #eee; border: 1px solid #ccc; color: #666; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        @media print { .tabs, .btn-add, .btn-reset, .split-box, .btn-del { display: none !important; } }
    </style>
</head>
<body>
<div class="app">
    <h2 id="title">LandCalc Pro</h2>
    
    <div class="tabs">
        <button id="t0" class="tab active" onclick="setTab(0)">Прямокутник</button>
        <button id="t1" class="tab" onclick="setTab(1)">Довільна</button>
        <button id="t2" class="tab" onclick="setTab(2)">Пошук</button>
    </div>

    <div id="p0" class="page active">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
            <div class="field"><label>Довжина (м)</label><input type="number" id="l0" oninput="doCalc()"></div>
            <div class="field"><label>Ширина (м)</label><input type="number" id="w0" oninput="doCalc()"></div>
        </div>
        <div class="split-box">
            <label>✂️ Поділ на частини (м²)</label>
            <div id="list0"></div>
            <button class="btn-add" onclick="addPart(0)">+ Додати частину</button>
        </div>
    </div>

    <div id="p1" class="page">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
            <input type="number" id="sa" placeholder="Стор. A" oninput="doCalc()">
            <input type="number" id="sb" placeholder="Стор. B" oninput="doCalc()">
            <input type="number" id="sc" placeholder="Стор. C" oninput="doCalc()">
            <input type="number" id="sd" placeholder="Стор. D" oninput="doCalc()">
        </div>
        <div class="field" style="margin-top:8px"><label>Діагональ (м)</label><input type="number" id="dg" oninput="doCalc()"></div>
        <div class="split-box">
            <label>✂️ Вписані частини (м²)</label>
            <div id="list1"></div>
            <button class="btn-add" onclick="addPart(1)">+ Додати частину</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="field"><label>Відома сторона (м)</label><input type="number" id="sk" oninput="doCalc()"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
            <div class="field"><label>м²</label><input type="number" id="fm2" oninput="syncFind(0)"></div>
            <div class="field"><label>сотки</label><input type="number" id="fsot" oninput="syncFind(1)"></div>
        </div>
    </div>

    <div class="res-box">
        <div id="res-main">
            <div class="res-row"><span>Загальна площа:</span><span><span id="om2" class="val">0.00</span> м²</span></div>
            <div class="res-row"><span>У сотках:</span><span><span id="osot" class="val">0.00</span> сот.</span></div>
            <div id="parts-res" style="margin-top:8px; border-top:1px dashed #ccc; padding-top:8px"></div>
        </div>
        <div id="res-find-box" style="display:none">
            <div class="res-row"><span>Шукана сторона:</span><span><span id="oside" class="val">0.00</span> м</span></div>
        </div>
    </div>

    <div id="canvas-wrap"><canvas id="mc" width="400" height="300"></canvas></div>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px">
        <button class="btn-add" style="background:#2196f3" onclick="window.print()">📄 PDF Звіт</button>
        <button class="btn-reset" style="margin-top:0" onclick="resetAll()">🔄 Очистити</button>
    </div>
</div>

<script>
    let mode = 0;
    let parts = { 0: [], 1: [] };
    const canv = document.getElementById('mc'), ctx = canv.getContext('2d');
    const colors = ["rgba(211, 47, 47, 0.4)", "rgba(25, 118, 210, 0.4)", "rgba(255, 193, 7, 0.4)", "rgba(156, 39, 176, 0.4)"];

    function setTab(idx) {
        mode = idx;
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
        document.querySelectorAll('.page').forEach((p, i) => p.classList.toggle('active', i === idx));
        document.getElementById('res-main').style.display = idx === 2 ? 'none' : 'block';
        document.getElementById('res-find-box').style.display = idx === 2 ? 'block' : 'none';
        document.getElementById('canvas-wrap').style.display = idx === 2 ? 'none' : 'block';
        doCalc();
    }

    function addPart(m) {
        parts[m].push({ m2: 0 });
        renderParts(m);
    }

    function removePart(m, i) {
        parts[m].splice(i, 1);
        renderParts(m);
        doCalc();
    }

    function renderParts(m) {
        const div = document.getElementById('list' + m);
        div.innerHTML = '';
        parts[m].forEach((p, i) => {
            const row = document.createElement('div');
            row.className = 'part-row';
            row.innerHTML = `
                <button class="btn-del" onclick="removePart(${m},${i})">×</button>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                    <div class="field"><label>м²</label><input type="number" value="${p.m2||''}" oninput="updatePart(${m},${i},this.value)"></div>
                    <div class="field"><label>сотки</label><input type="number" value="${p.m2?(p.m2/100).toFixed(2):''}" oninput="updatePart(${m},${i},this.value*100, true)"></div>
                </div>`;
            div.appendChild(row);
        });
    }

    function updatePart(m, i, val, isSot = false) {
        parts[m][i].m2 = parseFloat(val) || 0;
        if (!isSot) renderParts(m); // Оновити сотки візуально
        doCalc();
    }

    function syncFind(type) {
        let m2 = document.getElementById('fm2'), sot = document.getElementById('fsot');
        if (type === 0) sot.value = (parseFloat(m2.value) / 100 || 0).toFixed(2);
        else m2.value = (parseFloat(sot.value) * 100 || 0).toFixed(2);
        doCalc();
    }

    function resetAll() {
        document.querySelectorAll('input').forEach(i => i.value = '');
        parts = { 0: [], 1: [] };
        renderParts(0); renderParts(1);
        doCalc();
    }

    function heron(a, b, c) {
        if (a+b<=c || a+c<=b || b+c<=a) return 0;
        let p = (a+b+c)/2; return Math.sqrt(p*(p-a)*(p-b)*(p-c));
    }

    function doCalc() {
        let area = 0;
        ctx.clearRect(0, 0, 400, 300);
        document.getElementById('parts-res').innerHTML = '';

        if (mode === 0) {
            let l = parseFloat(document.getElementById('l0').value)||0, w = parseFloat(document.getElementById('w0').value)||0;
            area = l * w; if (l>0 && w>0) drawRect(l, w);
        } else if (mode === 1) {
            let a=parseFloat(document.getElementById('sa').value)||0, b=parseFloat(document.getElementById('sb').value)||0,
                c=parseFloat(document.getElementById('sc').value)||0, d=parseFloat(document.getElementById('sd').value)||0, dg=parseFloat(document.getElementById('dg').value)||0;
            area = heron(a, b, dg) + heron(c, d, dg);
            if (a>0 && b>0 && dg>0) drawPoly(a, b, c, d, dg);
        } else {
            let sk = parseFloat(document.getElementById('sk').value)||0, tm = parseFloat(document.getElementById('fm2').value)||0;
            document.getElementById('oside').innerText = sk > 0 ? (tm / sk).toFixed(2) : "0.00";
        }
        document.getElementById('om2').innerText = area.toFixed(2);
        document.getElementById('osot').innerText = (area / 100).toFixed(2);
    }

    function drawRect(l, w) {
        let sc = Math.min(300/l, 200/w), dw = l*sc, dh = w*sc, cur = 0;
        ctx.fillStyle = "rgba(46, 125, 50, 0.1)"; ctx.fillRect(50, 50, dw, dh);
        parts[0].forEach((p, i) => {
            if (p.m2 > 0) {
                let d = p.m2 / w;
                ctx.fillStyle = colors[i % colors.length];
                ctx.fillRect(50 + cur*sc, 50, d*sc, dh);
                cur += d; addRes(`Діл.${i+1}: Межа на ${cur.toFixed(2)}м`);
            }
        });
        ctx.strokeStyle = "#2e7d32"; ctx.strokeRect(50, 50, dw, dh);
    }

    function drawPoly(a, b, c, d, dg) {
        let cA=(a*a+dg*dg-b*b)/(2*a*dg), cD=(d*d+dg*dg-c*c)/(2*d*dg);
        if (Math.abs(cA)>1 || Math.abs(cD)>1) return;
        let sA=Math.sqrt(1-cA*cA), sD=Math.sqrt(1-cD*cD), sc=Math.min(300/dg, 150/Math.max(a*sA, d*sD));
        let p1={x:50,y:150}, p2={x:50+dg*sc,y:150}, p3={x:50+a*cA*sc,y:150-a*sA*sc}, p4={x:50+d*cD*sc,y:150+d*sD*sc};

        ctx.save();
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p4.x, p4.y); ctx.closePath();
        ctx.strokeStyle = "#2e7d32"; ctx.stroke();
        ctx.clip(); // Маска для щілини D

        let cum = 0;
        parts[1].forEach((p, i) => {
            if (p.m2 > 0) {
                let dep = p.m2 / a, ang = Math.atan2(p3.y-p1.y, p3.x-p1.x);
                ctx.save(); ctx.translate(p1.x, p1.y); ctx.rotate(ang);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fillRect(-1000, cum*sc, 2000, dep*sc);
                ctx.restore(); cum += dep; addRes(`Діл.${i+1}: Глибина ${dep.toFixed(2)}м (разом ${cum.toFixed(2)}м)`);
            }
        });
        ctx.restore();
        ctx.fillStyle = "#000"; ctx.fillText("A (Фасад)", p1.x, p1.y+15); ctx.fillText("D", p4.x, p4.y+15);
    }

    function addRes(t) {
        const d = document.createElement('div'); d.className = 'res-row';
        d.innerHTML = `<span style="color:var(--accent); font-weight:bold">${t}</span>`;
        document.getElementById('parts-res').appendChild(d);
    }
</script>
</body>
</html>
