<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandCalc — Земельний Помічник</title>
    <style>
        :root { --green: #2e7d32; --bg: #f5f7fa; --text: #333; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 15px; margin: 0; }
        .app { background: #ffffff; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: var(--green); text-align: center; margin: 0 0 20px 0; font-size: 22px; }
        
        /* Вкладки */
        .tabs { display: flex; background: #eee; border-radius: 10px; padding: 4px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 13px; color: #666; transition: 0.3s; }
        .tab.active { background: white; color: var(--green); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* Секції */
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .box { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #555; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; transition: border-color 0.2s; }
        input:focus { border-color: var(--green); outline: none; }
        
        /* Результати */
        .res-card { background: #e8f5e9; padding: 18px; border-radius: 12px; border: 1px solid #c8e6c9; margin-top: 10px; }
        .res-line { display: flex; justify-content: space-between; font-size: 18px; margin: 8px 0; }
        .val { font-weight: 900; color: var(--green); }
        .hidden { display: none; }
        .info { font-size: 12px; color: #888; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="app">
    <h2>LandCalc Pro</h2>
    
    <div class="tabs">
        <div id="btn0" class="tab active" onclick="switchTab(0)">Прямокутник</div>
        <div id="btn1" class="tab" onclick="switchTab(1)">Довільна</div>
        <div id="btn2" class="tab" onclick="switchTab(2)">Пошук</div>
    </div>

    <div id="page0" class="page active">
        <div class="row">
            <div class="box"><label>Довжина (м)</label><input type="number" id="l1" step="any" oninput="mainCalc()"></div>
            <div class="box"><label>Ширина (м)</label><input type="number" id="w1" step="any" oninput="mainCalc()"></div>
        </div>
    </div>

    <div id="page1" class="page">
        <div class="row">
            <div class="box"><label>Сторона A (м)</label><input type="number" id="sa" step="any" oninput="mainCalc()"></div>
            <div class="box"><label>Сторона B (м)</label><input type="number" id="sb" step="any" oninput="mainCalc()"></div>
            <div class="box"><label>Сторона C (м)</label><input type="number" id="sc" step="any" oninput="mainCalc()"></div>
            <div class="box"><label>Сторона D (м)</label><input type="number" id="sd" step="any" oninput="mainCalc()"></div>
        </div>
        <div class="box"><label>Діагональ (м)</label><input type="number" id="diag" step="any" oninput="mainCalc()"></div>
    </div>

    <div id="page2" class="page">
        <div class="box"><label>Відома сторона (м)</label><input type="number" id="sknown" step="any" oninput="mainCalc()"></div>
        <div class="row">
            <div class="box"><label>Площа (м²)</label><input type="number" id="area_m2" step="any" oninput="syncVal(0)"></div>
            <div class="box"><label>Площа (сотки)</label><input type="number" id="area_sot" step="any" oninput="syncVal(1)"></div>
        </div>
    </div>

    <div class="res-card">
        <div id="resNormal">
            <div class="res-line"><span>Площа:</span><span><span id="outM2" class="val">0.00</span> м²</span></div>
            <div class="res-line"><span>У сотках:</span><span><span id="outSot" class="val">0.00</span> сот.</span></div>
        </div>
        <div id="resSide" class="hidden">
            <div class="res-line"><span>Друга сторона:</span><span><span id="outSide" class="val">0.00</span> м</span></div>
        </div>
    </div>

    <div class="info">Розрахунок за методикою тріангуляції</div>
</div>

<script>
    let currentMode = 0;

    function switchTab(idx) {
        currentMode = idx;
        
        // Візуальне перемикання кнопок
        for(let i=0; i<3; i++) {
            document.getElementById('btn'+i).classList.toggle('active', i === idx);
            document.getElementById('page'+i).classList.toggle('active', i === idx);
        }
        
        // Зміна вигляду результату
        document.getElementById('resNormal').classList.toggle('hidden', idx === 2);
        document.getElementById('resSide').classList.toggle('hidden', idx !== 2);
        
        mainCalc();
    }

    function syncVal(type) {
        let m2 = document.getElementById('area_m2');
        let sot = document.getElementById('area_sot');
        if (type === 0) {
            sot.value = (parseFloat(m2.value) / 100 || 0).toFixed(2);
        } else {
            m2.value = (parseFloat(sot.value) * 100 || 0).toFixed(2);
        }
        mainCalc();
    }

    function heronArea(a, b, c) {
        if (a + b <= c || a + c <= b || b + c <= a) return 0;
        let p = (a + b + c) / 2;
        return Math.sqrt(p * (p - a) * (p - b) * (p - c));
    }

    function mainCalc() {
        if (currentMode === 0) {
            let l = parseFloat(document.getElementById('l1').value) || 0;
            let w = parseFloat(document.getElementById('w1').value) || 0;
            render(l * w);
        } 
        else if (currentMode === 1) {
            let a = parseFloat(document.getElementById('sa').value) || 0;
            let b = parseFloat(document.getElementById('sb').value) || 0;
            let c = parseFloat(document.getElementById('sc').value) || 0;
            let d = parseFloat(document.getElementById('sd').value) || 0;
            let dg = parseFloat(document.getElementById('diag').value) || 0;
            
            let area = 0;
            if (a && b && dg) area += heronArea(a, b, dg);
            if (c && d && dg) area += heronArea(c, d, dg);
            render(area);
        } 
        else if (currentMode === 2) {
            let side = parseFloat(document.getElementById('sknown').value) || 0;
            let area = parseFloat(document.getElementById('area_m2').value) || 0;
            document.getElementById('outSide').innerText = side > 0 ? (area / side).toFixed(2) : "0.00";
        }
    }

    function render(val) {
        document.getElementById('outM2').innerText = val.toLocaleString('uk-UA', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('outSot').innerText = (val / 100).toLocaleString('uk-UA', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }
</script>

</body>
</html>
