<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandCalc Pro — Ultimate</title>
    <style>
        :root { --p: #2e7d32; --bg: #f0f2f5; --accent: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .app { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 460px; }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 15px; background: #eee; padding: 4px; border-radius: 8px; }
        .tab { flex: 1; padding: 10px 2px; text-align: center; cursor: pointer; border-radius: 6px; font-size: 11px; font-weight: bold; background: none; border: none; color: #666; }
        .tab.active { background: white; color: var(--p); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .page { display: none; } .page.active { display: block; }
        .field { margin-bottom: 8px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #555; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
        
        .split-box { background: #fffde7; padding: 12px; border-radius: 10px; border: 1px solid #fff9c4; margin-top: 10px; }
        .part-row { background: white; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 8px; position: relative; }
        .part-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 5px; }
        .btn-add { width: 100%; padding: 10px; background: var(--p); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-del { background: #ffcdd2; color: #c62828; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; float: right; font-size: 12px; }

        .res-box { background: #e8f5e9; padding: 12px; border-radius: 10px; border-left: 5px solid var(--p); margin-top: 15px; }
        .res-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 14px; }
        .val { font-weight: bold; color: var(--p); }
        
        .dir-group { display: flex; gap: 4px; margin-top: 5px; }
        .dir-btn { flex: 1; padding: 6px; font-size: 10px; border: 1px solid #ccc; background: white; border-radius: 5px; cursor: pointer; }
        .dir-btn.active { background: var(--p); color: white; border-color: var(--p); }

        #canvas-wrap { margin-top: 15px; border: 1px dashed #aaa; border-radius: 8px; background: #fafafa; }
        canvas { width: 100%; height: auto; display: block; }
        .btn-clear { width: 100%; padding: 10px; background: #fff1f1; border: 1px solid #ffcdd2; color: #c62828; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
<div class="app">
    <div class="tabs">
        <button id="t0" class="tab active" onclick="setTab(0)">Прямокутник</button>
        <button id="t1" class="tab" onclick="setTab(1)">Довільна</button>
        <button id="t2" class="tab" onclick="setTab(2)">Пошук</button>
    </div>

    <div id="p0" class="page active">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
            <div class="field"><label>Довжина (м)</label><input type="number" id="l0" oninput="doCalc()"></div>
            <div class="field"><label>Ширина (м)</label><input type="number" id="w0" oninput="doCalc()"></div>
        </div>
        <div class="split-box">
            <label>✂️ Поділ на частини</label>
            <div class="dir-group">
                <button id="rv" class="dir-btn active" onclick="setDir('v')">Впоперек</button>
                <button id="rh" class="dir-btn" onclick="setDir('h')">Вздовж</button>
            </div>
            <div id="list0" style="margin-top:10px"></div>
            <button class="btn-add" onclick="addPart(0)">+ Додати частину</button>
        </div>
    </div>

    <div id="p1" class="page">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
            <input type="number" id="sa" placeholder="Стор. A" oninput="doCalc()">
            <input type="number" id="sb" placeholder="Стор. B" oninput="doCalc()">
            <input type="number" id="sc" placeholder="Стор. C" oninput="doCalc()">
            <input type="number" id="sd" placeholder="Стор. D" oninput="doCalc()">
        </div>
        <div class="field" style="margin-top:8px"><label>Діагональ (м)</label><input type="number" id="dg" oninput="doCalc()"></div>
        <div class="split-box">
            <label>✂️ Вписані прямокутники</label>
            <select id="base_side" onchange="doCalc()" style="margin-bottom:8px">
                <option value="a">Від сторони A</option>
                <option value="d">Від сторони D</option>
            </select>
            <div id="list1"></div>
            <button class="btn-add" onclick="addPart(1)">+ Додати прямокутник</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="field"><label>Відома сторона (м)</label><input type="number" id="sk" oninput="doCalc()"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
            <div class="field"><label>Площа (м²)</label><input type="number" id="fm2" oninput="syncFind(0)"></div>
            <div class="field"><label>Площа (сотки)</label><input type="number" id="fsot" oninput="syncFind(1)"></div>
        </div>
    </div>

    <div class="res-box">
        <div id="res-normal">
            <div class="res-row"><span>Загальна площа:</span><span><span id="om2" class="val">0.00</span> м²</span></div>
            <div class="res-row"><span>У сотках:</span><span><span id="osot" class="val">0.00</span> сот.</span></div>
            <div id="multi-res" style="margin-top:8px; border-top:1px dashed #ccc; padding-top:8px"></div>
        </div>
        <div id="res-side" style="display:none">
            <div class="res-row"><span>Шукана сторона:</span><span><span id="oside" class="val">0.00</span> м</span></div>
        </div>
    </div>

    <div id="canvas-wrap"><canvas id="mc" width="400" height="300"></canvas></div>
    <button class="btn-clear" onclick="location.reload()">Очистити все</button>
</div>

<script>
    let mode = 0, rectDir = 'v';
    let parts = { 0: [], 1: [] };
    const canv = document.getElementById('mc'), ctx = canv.getContext('2d');
    const colors = ["rgba(211, 47, 47, 0.35)", "rgba(25, 118, 210, 0.35)", "rgba(255, 193, 7, 0.35)", "rgba(156, 39, 176, 0.35)"];

    function setTab(idx) {
        mode = idx;
        document.querySelectorAll('.tab').forEach((t, i) => t.className = (i === idx) ? 'tab active' : 'tab');
        document.querySelectorAll('.page').forEach((p, i) => p.className = (i === idx) ? 'page active' : 'page');
        document.getElementById('res-normal').style.display = idx === 2 ? 'none' : 'block';
        document.getElementById('res-side').style.display = idx === 2 ? 'block' : 'none';
        document.getElementById('canvas-wrap').style.display = idx === 2 ? 'none' : 'block';
        doCalc();
    }

    function addPart(m) {
        parts[m].push({ m2: 0, w: 0 });
        renderParts(m);
    }

    function renderParts(m) {
        const div = document.getElementById('list' + m);
        div.innerHTML = '';
        parts[m].forEach((p, i) => {
            const row = document.createElement('div');
            row.className = 'part-row';
            row.innerHTML = `
                <button class="btn-del" onclick="removePart(${m},${i})">×</button>
                <div class="part-grid">
                    <div><label>м²</label><input type="number" id="m2_${m}_${i}" value="${p.m2||''}" oninput="syncPart(${m},${i},0)"></div>
                    <div><label>сотки</label><input type="number" id="sot_${m}_${i}" value="${p.m2?(p.m2/100).toFixed(2):''}" oninput="syncPart(${m},${i},1)"></div>
                </div>
                ${m===1 ? `<div class="field"><label>Ширина вздовж межі (м)</label><input type="number" value="${p.w||''}" oninput="updatePartVal(${m},${i},'w',this.value)"></div>` : ''}
            `;
            div.appendChild(row);
        });
    }

    function syncPart(m, i, type) {
        let m2 = document.getElementById(`m2_${m}_${i}`), sot = document.getElementById(`sot_${m}_${i}`);
        if (type === 0) sot.value = (parseFloat(m2.value) / 100 || 0).toFixed(2);
        else m2.value = (parseFloat(sot.value) * 100 || 0).toFixed(2);
        parts[m][i].m2 = parseFloat(m2.value) || 0;
        doCalc();
    }

    function syncFind(type) {
        let m2 = document.getElementById('fm2'), sot = document.getElementById('fsot');
        if (type === 0) sot.value = (parseFloat(m2.value) / 100 || 0).toFixed(2);
        else m2.value = (parseFloat(sot.value) * 100 || 0).toFixed(2);
        doCalc();
    }

    function updatePartVal(m, i, key, val) { parts[m][i][key] = parseFloat(val) || 0; doCalc(); }
    function removePart(m, i) { parts[m].splice(i, 1); renderParts(m); doCalc(); }
    function setDir(d) { rectDir = d; document.getElementById('rv').className = d==='v'?'dir-btn active':'dir-btn'; document.getElementById('rh').className = d==='h'?'dir-btn active':'dir-btn'; doCalc(); }

    function heron(a, b, c) {
        if (a+b<=c || a+c<=b || b+c<=a) return 0;
        let p = (a+b+c)/2; return Math.sqrt(p*(p-a)*(p-b)*(p-c));
    }

    function drawLabel(txt, p1, p2, off = 15) {
        ctx.fillStyle = "#555"; ctx.font = "bold 12px Arial";
        let mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        let ang = Math.atan2(p2.y - p1.y, p2.x - p1.x);
        ctx.fillText(txt, mx + Math.cos(ang + Math.PI/2)*off - 4, my + Math.sin(ang + Math.PI/2)*off + 4);
    }

    function doCalc() {
        let area = 0;
        ctx.clearRect(0, 0, canv.width, canv.height);
        const resList = document.getElementById('multi-res');
        resList.innerHTML = '';

        if (mode === 0) {
            let l = parseFloat(document.getElementById('l0').value)||0, w = parseFloat(document.getElementById('w0').value)||0;
            area = l * w;
            drawRect(l, w);
        } else if (mode === 1) {
            let a=parseFloat(document.getElementById('sa').value)||0, b=parseFloat(document.getElementById('sb').value)||0,
                c=parseFloat(document.getElementById('sc').value)||0, d=parseFloat(document.getElementById('sd').value)||0, dg=parseFloat(document.getElementById('dg').value)||0;
            area = heron(a, b, dg) + heron(c, d, dg);
            drawPoly(a, b, c, d, dg);
        } else {
            let sk = parseFloat(document.getElementById('sk').value)||0, tm = parseFloat(document.getElementById('fm2').value)||0;
            document.getElementById('oside').innerText = sk > 0 ? (tm / sk).toFixed(2) : "0.00";
        }
        document.getElementById('om2').innerText = area.toFixed(2);
        document.getElementById('osot').innerText = (area / 100).toFixed(2);
    }

    function drawRect(l, w) {
        if (l <= 0 || w <= 0) return;
        let sc = Math.min(300/l, 200/w), dw = l*sc, dh = w*sc, x = 50, y = 50;
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(x, y, dw, dh);
        
        let cur = 0;
        parts[0].forEach((p, i) => {
            if (p.m2 > 0) {
                let dist = p.m2 / (rectDir === 'v' ? w : l);
                ctx.fillStyle = colors[i % colors.length];
                if (rectDir === 'v') { ctx.fillRect(x + cur*sc, y, dist*sc, dh); cur += dist; }
                else { ctx.fillRect(x, y + cur*sc, dw, dist*sc); cur += dist; }
                addLabel(`Ч.${i+1}: Відступ ${cur.toFixed(2)}м`);
            }
        });
        ctx.strokeStyle = varProp('--p'); ctx.lineWidth = 2; ctx.strokeRect(x, y, dw, dh);
        drawLabel("L", {x:x,y:y}, {x:x+dw,y:y}, -10); drawLabel("W", {x:x+dw,y:y}, {x:x+dw,y:y+dh}, 15);
    }

    function drawPoly(a, b, c, d, dg) {
        if (a<=0 || b<=0 || dg<=0) return;
        let cA=(a*a+dg*dg-b*b)/(2*a*dg), cD=(d*d+dg*dg-c*c)/(2*d*dg);
        if (Math.abs(cA)>1 || Math.abs(cD)>1) return;
        let sA=Math.sqrt(1-cA*cA), sD=Math.sqrt(1-cD*cD), sc=Math.min(300/dg, 150/Math.max(a*sA, d*sD));
        let p1={x:50,y:150}, p2={x:50+dg*sc,y:150}, p3={x:50+a*cA*sc,y:150-a*sA*sc}, p4={x:50+d*cD*sc,y:150+d*sD*sc};
        
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p4.x, p4.y); ctx.closePath();
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fill(); ctx.strokeStyle = varProp('--p'); ctx.stroke();
        drawLabel("A", p1, p3, -10); drawLabel("B", p3, p2, -10); drawLabel("C", p2, p4, -10); drawLabel("D", p4, p1, -10);

        let off = 0;
        parts[1].forEach((p, i) => {
            if (p.m2 > 0 && p.w > 0) {
                let len = p.m2 / p.w, base = document.getElementById('base_side').value;
                ctx.save();
                let start = p1, end = (base === 'a' ? p3 : p4), ang = Math.atan2(end.y - start.y, end.x - start.x);
                ctx.translate(p1.x, p1.y); ctx.rotate(ang);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fillRect(off*sc, 0, p.w*sc, (base==='a'?1:-1)*len*sc);
                ctx.restore();
                off += p.w;
                addLabel(`Ч.${i+1}: Глибина ${len.toFixed(2)}м (відступ ${off.toFixed(2)}м)`);
            }
        });
        ctx.setLineDash([5, 5]); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.strokeStyle = "#ccc"; ctx.stroke(); ctx.setLineDash([]);
    }

    function addLabel(t) {
        const div = document.createElement('div');
        div.className = 'res-row'; div.innerHTML = `<span style="color:var(--accent); font-weight:bold">${t}</span>`;
        document.getElementById('multi-res').appendChild(div);
    }
    function varProp(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
</script>
</body>
</html>
