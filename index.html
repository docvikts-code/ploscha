<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandCalc Pro + Візуалізація</title>
    <style>
        :root { --p: #2e7d32; --bg: #f4f4f4; --red: #d32f2f; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 15px; margin: 0; color: #333; }
        .app { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: var(--p); text-align: center; margin: 0 0 20px 0; font-weight: 700; }
        
        /* Tabs */
        .tabs { display: flex; background: #f0f2f5; border-radius: 10px; padding: 4px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; font-size: 13px; font-weight: 600; color: #666; transition: all 0.2s ease; }
        .tab.active { background: white; color: var(--p); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        
        /* Pages & Inputs */
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px; box-sizing: border-box; font-size: 16px; transition: border-color 0.2s; -moz-appearance: textfield; }
        input:focus { border-color: var(--p); outline: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* Buttons */
        .btn-clear { width: 100%; padding: 12px; background: #ffebee; border: none; color: var(--red); border-radius: 10px; cursor: pointer; font-weight: 700; margin-top: 10px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-clear:hover { background: #ffcdd2; }
        
        /* Results */
        .res-box { background: #e8f5e9; padding: 20px; border-radius: 12px; margin-top: 25px; }
        .res-line { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #c8e6c9; }
        .res-line:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .res-label { color: #555; }
        .val { font-weight: 800; color: var(--p); font-size: 18px; }
        .hidden { display: none; }
        
        /* CANVAS Vizualization */
        .canvas-container { margin-top: 25px; text-align: center; }
        #plotCanvas { background: #fafafa; border: 2px dashed #ddd; border-radius: 12px; max-width: 100%; }
        .canvas-label { font-size: 12px; color: #888; margin-bottom: 5px; display: block;font-weight: bold;}
    </style>
</head>
<body>

<div class="app">
    <h2>LandCalc Pro</h2>
    
    <div class="tabs">
        <div id="t0" class="tab active" onclick="setTab(0)">Прямокутник</div>
        <div id="t1" class="tab" onclick="setTab(1)">Довільна</div>
        <div id="t2" class="tab" onclick="setTab(2)">Пошук</div>
    </div>

    <div id="p0" class="page active">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div class="field"><label>Довжина (м)</label><input type="number" id="l0" class="in" placeholder="0" oninput="calc()"></div>
            <div class="field"><label>Ширина (м)</label><input type="number" id="w0" class="in" placeholder="0" oninput="calc()"></div>
        </div>
    </div>

    <div id="p1" class="page">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div class="field"><label>Сторона A</label><input type="number" id="sa" class="in" placeholder="0" oninput="calc()"></div>
            <div class="field"><label>Сторона B</label><input type="number" id="sb" class="in" placeholder="0" oninput="calc()"></div>
            <div class="field"><label>Сторона C</label><input type="number" id="sc" class="in" placeholder="0" oninput="calc()"></div>
            <div class="field"><label>Сторона D</label><input type="number" id="sd" class="in" placeholder="0" oninput="calc()"></div>
        </div>
        <div class="field"><label>Діагональ (між AB і CD)</label><input type="number" id="dg" class="in" placeholder="0" oninput="calc()"></div>
    </div>

    <div id="p2" class="page">
        <div class="field"><label>Відома сторона (м)</label><input type="number" id="sk" class="in" placeholder="0" oninput="calc()"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div class="field"><label>Площа (м²)</label><input type="number" id="am2" class="in" placeholder="0" oninput="sync(0)"></div>
            <div class="field"><label>Площа (сотки)</label><input type="number" id="asot" class="in" placeholder="0" oninput="sync(1)"></div>
        </div>
    </div>

    <button class="btn-clear" onclick="clearAll()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2
