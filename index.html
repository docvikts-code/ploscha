<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandCalc Pro — Кольоровий Поділ</title>
    <style>
        :root { --p: #2e7d32; --bg: #f0f2f5; --accent: #d32f2f; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .app { background: var(--white); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 15px; background: #eee; padding: 4px; border-radius: 8px; }
        .tab { flex: 1; padding: 10px 5px; text-align: center; cursor: pointer; border-radius: 6px; font-size: 11px; font-weight: bold; background: none; border: none; color: #666; transition: 0.2s; }
        .tab.active { background: var(--white); color: var(--p); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .field { margin-bottom: 10px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #555; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--p); }
        
        .split-box { background: #fffde7; padding: 10px; border-radius: 8px; border: 1px solid #fff9c4; margin-top: 10px; }
        .split-title { font-size: 11px; font-weight: bold; color: #f57f17; margin-bottom: 8px; display: block; }
        .toggle-group { display: flex; gap: 5px; margin-top: 5px; }
        .toggle-btn { flex: 1; font-size: 10px; padding: 5px; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 4px; }
        .toggle-btn.active { background: var(--p); color: white; border-color: var(--p); }

        .res-box { background: #e8f5e9; padding: 12px; border-radius: 10px; border-left: 5px solid var(--p); margin-top: 15px; }
        .res-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 15px; }
        .val { font-weight: bold; color: var(--p); }
        .split-val { color: var(--accent); font-weight: bold; }

        #canvas-wrap { margin-top: 15px; border: 1px dashed #aaa; border-radius: 8px; background: #fafafa; position: relative; }
        canvas { width: 100%; height: auto; display: block; }
        
        .btn-clear { width: 100%; padding: 10px; background: #fff1f1; border: 1px solid #ffcdd2; color: #c62828; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="app">
    <div class="tabs">
        <button id="t0" class="tab active" onclick="setMode(0)">Прямокутник</button>
        <button id="t1" class="tab" onclick="setMode(1)">Довільна</button>
        <button id="t2" class="tab" onclick="setMode(2)">Пошук</button>
    </div>

    <div id="p0" class="section active">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
            <div class="field"><label>Довжина (м)</label><input type="number" id="l0" oninput="calculate()"></div>
            <div class="field"><label>Ширина (м)</label><input type="number" id="w0" oninput="calculate()"></div>
        </div>
        <div class="split-box">
            <span class="split-title">✂️ Поділ прямокутника</span>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                <input type="number" id="sM2_0" placeholder="м²" oninput="syncSplit(0,0)">
                <input type="number" id="sSot_0" placeholder="сотки" oninput="syncSplit(0,1)">
            </div>
            <div class="toggle-group">
                <button id="dir-v" class="toggle-btn active" onclick="setDir('v')">Впоперек</button>
                <button id="dir-h" class="toggle-btn" onclick="setDir('h')">Вздовж</button>
            </div>
        </div>
    </div>

    <div id="p1" class="section">
