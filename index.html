<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandCalc Pro</title>
    <style>
        :root { --p: #2e7d32; --bg: #f5f5f5; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 15px; margin: 0; }
        .app { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        h2 { color: var(--p); text-align: center; margin-bottom: 20px; }
        
        /* Вкладки */
        .tabs { display: flex; background: #eee; border-radius: 10px; padding: 4px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; font-weight: bold; color: #666; transition: 0.2s; }
        .tab.active { background: white; color: var(--p); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Секції */
        .page { display: none; }
        .page.active { display: block; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .box { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--p); }
        
        /* Результат */
        .res-card { background: #e8f5e9; padding: 15px; border-radius: 10px; border: 1px solid #c8e6c9; }
        .res-line { display: flex; justify-content: space-between; font-size: 18px; margin: 5px 0; }
        .val { font-weight: bold; color: var(--p); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app">
    <h2>LandCalc</h2>
    
    <div class="tabs">
        <div class="tab active" onclick="tab(0)">Прямокутник</div>
        <div class="tab" onclick="tab(1)">Довільна</div>
        <div class="tab" onclick="tab(2)">Пошук</div>
    </div>

    <div id="p0" class="page active">
        <div class="grid">
            <div class="box"><label>Довжина (м)</label><input type="number" id="l1" oninput="calc()"></div>
            <div class="box"><label>Ширина (м)</label><input type="number" id="w1" oninput="calc()"></div>
        </div>
    </div>

    <div id="p1" class="page">
        <div class="grid">
            <div class="box"><label>Стор. A (м)</label><input type="number" id="sa" oninput="calc()"></div>
            <div class="box"><label>Стор. B (м)</label><input type="number" id="sb" oninput="calc()"></div>
            <div class="box"><label>Стор. C (м)</label><input type="number" id="sc" oninput="calc()"></div>
            <div class="box"><label>Стор. D (м)</label><input type="number" id="sd" oninput="calc()"></div>
        </div>
        <div class="box"><label>Діагональ (м)</label><input type="number" id="dg" oninput="calc()"></div>
    </div>

    <div id="p2" class="page">
        <div class="box"><label>Відома сторона (м)</label><input type="number" id="sk" oninput="calc()"></div>
        <div class="grid">
            <div class="box"><label>Площа (м²)</label><input type="number" id="am2" oninput="sync(0)"></div>
            <div class="box"><label>Площа (сотки)</label><input type="number" id="asot" oninput="sync(1)"></div>
        </div>
    </div>

        <div id="res-main">
            <div class="res-line"><span>Площа:</span><span><span id="om2" class="val">0.00</span> м²</span></div>
            <div class="res-line"><span>У сотках:</span><span><span id="osot" class="val">0.00</span> сот.</span></div>
        </div>
