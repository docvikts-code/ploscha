<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandCalc — Фінальна версія</title>
    <style>
        :root { --green: #2e7d32; --bg: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 15px; margin: 0; }
        .app { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: var(--green); text-align: center; margin: 0 0 20px 0; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { flex: 1; padding: 12px 5px; text-align: center; cursor: pointer; font-weight: bold; color: #777; border-bottom: 3px solid transparent; font-size: 14px; }
        .tab.active { color: var(--green); border-bottom-color: var(--green); }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; -moz-appearance: textfield; }
        
        .result-box { background: #e8f5e9; padding: 15px; border-radius: 10px; border-left: 5px solid var(--green); margin-top: 20px; }
        .res-row { display: flex; justify-content: space-between; font-size: 18px; margin: 5px 0; }
        .res-val { font-weight: bold; color: var(--green); }
        .hidden { display: none; }
        .hint { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app">
    <h2>LandCalc</h2>
    
    <div class="tabs">
        <div id="t1" class="tab active" onclick="changeTab(1)">Прямокутник</div>
        <div id="t2" class="tab" onclick="changeTab(2)">Довільна</div>
        <div id="t3" class="tab" onclick="changeTab(3)">Пошук</div>
    </div>

    <div id="p1" class="section active">
        <div class="input-group"><label>Довжина (метри)</label><input type="number" id="len" oninput="doMath()"></div>
        <div class="input-group"><label>Ширина (метри)</label><input type="number" id="wid" oninput="doMath()"></div>
    </div>

    <div id="p2" class="section">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="input-group"><label>Сторона A</label><input type="number" id="sa" oninput="doMath()"></div>
            <div class="input-group"><label>Сторона B</label><input type="number" id="sb" oninput="doMath()"></div>
            <div class="input-group"><label>Сторона C</label><input type="number" id="sc" oninput="doMath()"></div>
            <div class="input-group"><label>Сторона D</label><input type="number" id="sd" oninput="doMath()"></div>
        </div>
        <div class="input-group"><label>Діагональ (метри)</label><input type="number" id="diag" oninput="doMath()"></div>
    </div>

    <div id="p3" class="section">
        <div class="input-group"><label>Відома сторона (метри)</label><input type="number" id="sideK" oninput="doMath()"></div>
        <div class="input-group"><label>Площа (м²)</label><input type="number" id="m2Input" oninput="sync(1)"></div>
        <div class="input-group"><label>Площа (сотки)</label><input type="number" id="sotkaInput" oninput="sync(2)"></div>
    </div>

    <div class="result-box">
