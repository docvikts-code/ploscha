<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandCalc — Final Debug</title>
    <style>
        :root { --p: #2e7d32; --bg: #f4f4f4; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 15px; margin: 0; }
        .app { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 100%; max-width: 420px; }
        h2 { color: var(--p); text-align: center; margin: 0 0 10px 0; }
        
        /* Статус перевірки JS */
        #js-check { text-align: center; font-size: 10px; color: red; margin-bottom: 10px; font-weight: bold; }
        
        .tabs { display: flex; background: #eee; border-radius: 8px; padding: 3px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 6px; font-size: 13px; font-weight: bold; color: #666; transition: 0.2s; }
        .tab.active { background: white; color: var(--p); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .page { display: none; }
        .page.active { display: block; }
        
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border: 2px solid var(--p); }
        
        .res-box { background: #e8f5e9; padding: 15px; border-radius: 10px; border-left: 5px solid var(--p); margin-top: 20px; }
        .res-line { display: flex; justify-content: space-between; font-size: 18px; margin: 5px 0; }
        .val { font-weight: bold; color: var(--p); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app">
    <div id="js-check">JS НЕ ЗАПУЩЕНО</div>
    <h2>LandCalc Pro</h2>
    
    <div class="tabs">
        <div id="t0" class="tab active" onclick="setTab(0)">Прямокутник</div>
        <div id="t1" class="tab" onclick="setTab(1)">Довільна</div>
        <div id="t2" class="tab" onclick="setTab(2)">Пошук</div>
    </div>

    <div id="p0" class="page active">
        <div class="field"><label>Довжина (м)</label><input type="number" id="l0" oninput="calculate()"></div>
        <div class="field"><label>Ширина (м)</label><input type="number" id="w0" oninput="calculate()"></div>
    </div>

    <div id="p1" class="page">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="field"><label>Стор. A</label><input type="number" id="sa" oninput="calculate()"></div>
            <div class="field"><label>Стор. B</label><input type="number" id="sb" oninput="calculate()"></div>
            <div class="field"><label>Стор. C</label><input type="number" id="sc" oninput="calculate()"></div>
            <div class="field"><label>Стор. D</label><input type="number" id="sd" oninput="calculate()"></div>
        </div>
        <div class="field"><label>Діагональ (м)</label><input type="number" id="dg" oninput="calculate()"></div>
    </div>

    <div id="p2" class="page">
        <div class="field"><label>Відома сторона (м)</label><input type="number" id="sk" oninput="calculate()"></div>
        <div class="field"><label>Площа (м²)</label><input type="number" id="am2" oninput="sync(0)"></div>
        <div class="field"><label>Площа (сотки)</label><input type="number" id="asot" oninput="sync(1)"></div>
    </div>

    <div class="res-box">
        <div id="res-std">
            <div class="res-line"><span>Площа:</span><span><span id="om2" class="val">0.00</span> м²</span></div>
            <div class="res-line"><span>У сотках:</span><span><span id="osot" class="val">0.00</span> сот.</span></div>
        </div>
        <div id="res-side" class="hidden">
            <div class="res-line"><span>Шукана довжина:</span><span><span id="oside" class="val">0.00</span> м</span></div>
        </div>
    </div>
</div>

<script>
    // Показуємо, що JS працює
    document.getElementById('js-check').innerText = 'JS АКТИВНИЙ';
    document.getElementById('js-check').style.color = 'green';

    let currentMode = 0;

    function setTab(idx) {
        currentMode = idx;
        // Оновлення кнопок і сторінок
        for (let i = 0; i < 3; i++) {
            document.getElementById('t' + i).className = (i === idx) ? 'tab active' : 'tab';
            document.getElementById('p' + i).className = (i === idx) ? 'page active' : 'page';
        }
        // Результати
        document.getElementById('res-std').className = (idx === 2) ? 'hidden' : '';
        document.getElementById('res-side').className = (idx === 2) ? '' : 'hidden';
        calculate();
    }

    function sync(type) {
        let m2 = document.getElementById('am2');
        let sot = document.getElementById('asot');
        if (type === 0) sot.value = (parseFloat(m2.value) / 100 || 0).toFixed(2);
        else m2.value = (parseFloat(sot.value) * 100 || 0).toFixed(2);
        calculate();
    }

    function heron(a, b, c) {
        if (a + b <= c || a + c <= b || b + c <= a) return 0;
        let p = (a + b + c) / 2;
        return Math.sqrt(p * (p - a) * (p - b) * (p - c));
    }

    function calculate() {
        if (currentMode === 0) {
            let res = (parseFloat(document.getElementById('l0').value) || 0) * (parseFloat(document.getElementById('w0').value) || 0);
            updateUI(res);
        } else if (currentMode === 1) {
            let a = parseFloat(document.getElementById('sa').value) || 0;
            let b = parseFloat(document.getElementById('sb').value) || 0;
            let c = parseFloat(document.getElementById('sc').value) || 0;
            let d = parseFloat(document.getElementById('sd').value) || 0;
            let dg = parseFloat(document.getElementById('dg').value) || 0;
            updateUI(heron(a, b, dg) + heron(c, d, dg));
        } else if (currentMode === 2) {
            let side = parseFloat(document.getElementById('sk').value) || 0;
            let area = parseFloat(document.getElementById('am2').value) || 0;
            document.getElementById('oside').innerText = side > 0 ? (area / side).toFixed(2) : "0.00";
        }
    }

    function updateUI(val) {
        document.getElementById('om2').innerText = val.toFixed(2);
        document.getElementById('osot').innerText = (val / 100).toFixed(2);
    }
</script>
</body>
</html>
